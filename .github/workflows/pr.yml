name: PR

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # go.mod replace points at ../pogo-pvp-engine on the developer
      # laptop; CI checks the engine into a workspace-local path and
      # rewrites the replace to point there. Drop this step (and the
      # go mod edit below) once the engine is published to
      # proxy.golang.org.
      - name: Checkout engine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lexfrei/pogo-pvp-engine
          path: .engine-src

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Rewrite engine replace directive
        run: go mod edit -replace=github.com/lexfrei/pogo-pvp-engine=./.engine-src

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout engine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lexfrei/pogo-pvp-engine
          path: .engine-src

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Rewrite engine replace directive
        run: go mod edit -replace=github.com/lexfrei/pogo-pvp-engine=./.engine-src

      - name: Run tests
        run: go test -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout engine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lexfrei/pogo-pvp-engine
          path: .engine-src

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Rewrite engine replace directive
        run: go mod edit -replace=github.com/lexfrei/pogo-pvp-engine=./.engine-src

      - name: Build binary
        run: go build -o /dev/null ./cmd/pogo-pvp-mcp

  docker-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Mirror the release workflow's engine wiring so the Dockerfile
      # named-build-context stays covered by PR CI. Catches drift in
      # the Containerfile or build-image.sh before it reaches a tag.
      - name: Checkout engine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lexfrei/pogo-pvp-engine
          path: .engine-src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build image (single arch, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Containerfile
          build-contexts: |
            engine=./.engine-src
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=pr-smoke
          cache-to: type=gha,scope=pr-smoke,mode=max
